version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: geoattendance-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootpassword}
      POSTGRES_DB: geoattendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: geoattendance-storage-prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rootuser}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rootpassword123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_prod:/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: geoattendance-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-rootpassword}@postgres:5432/geoattendance?schema=public
      - JWT_SECRET=${JWT_SECRET:-supers3cr3tproduction}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-rootuser}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-rootpassword123}
      - MINIO_BUCKET=geoattendance
    depends_on:
      - postgres
      - minio
    restart: unless-stopped
    command: sh -c "npx prisma db push && npm run start:prod"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geoattendance-backend.rule=Host(`geo.idkmanager.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.geoattendance-backend.entrypoints=websecure"
      - "traefik.http.routers.geoattendance-backend.tls=true"
      - "traefik.http.services.geoattendance-backend.loadbalancer.server.port=3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geoattendance-frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://geo.idkmanager.com/api
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geoattendance-frontend.rule=Host(`geo.idkmanager.com`)"
      - "traefik.http.routers.geoattendance-frontend.entrypoints=websecure"
      - "traefik.http.routers.geoattendance-frontend.tls=true"
      - "traefik.http.services.geoattendance-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data_prod:
  minio_data_prod:
